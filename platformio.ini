; ============================================================================
;  platformio.ini — Beverage Antenna Controller
; ============================================================================
;
;  HOW TO SELECT YOUR BUILD
;  ────────────────────────
;  Edit the line below to select which station to build:
;    default_envs = daniel-club    → Daniel's hardware, CLUB role
;    default_envs = daniel-remote  → Daniel's hardware, REMOTE role
;    default_envs = henryk-club    → Henryk's hardware, CLUB role
;    default_envs = henryk-remote  → Henryk's hardware, REMOTE role
;
;  No file renaming needed — both CLUB_STATION.cpp and REMOTE_STATION.cpp
;  always exist; build_src_filter selects the right one per environment.
;
;  HOW TO ADAPT FOR A NEW STATION
;  ───────────────────────────────
;  1. Copy one of the [xxx-hw] sections below and rename it.
;  2. Update the pin assignments to match your wiring.
;  3. Set your QTH coordinates (HOME_LAT_DEG_CFG / HOME_LON_DEG_CFG).
;  4. Add two new environments (yourname-club, yourname-remote) following
;     the daniel-club / daniel-remote pattern, referencing your new hw section.
;  5. Set default_envs to your desired environment.
;
;  TFT DISPLAY INVERSION
;  ──────────────────────
;  IPS panels need TFT_INVERSION_ON (default).
;  Standard TN panels need TFT_INVERSION_OFF — uncomment that line in [tft].
;
; ============================================================================

[platformio]
default_envs = daniel-club
; default_envs = daniel-remote
; default_envs = henryk-club
; default_envs = henryk-remote


; ── TFT inversion (shared) ───────────────────────────────────────────────────
[tft]
;inversion = -D TFT_INVERSION_ON   ; IPS panel (default)
inversion = -D TFT_INVERSION_OFF ; Standard TN panel


; ── Base configuration (shared by all stations) ──────────────────────────────
[base]
platform = espressif32@^6.12.0
platform_packages =
  tool-esptoolpy@1.40501.0

board = esp32dev
framework = arduino
upload_speed = 921600      ; try 460800 or 115200 if uploads get flaky
monitor_speed = 115200

board_build.filesystem = littlefs
board_build.partitions = default.csv

build_flags =
	-Wl,-Map,firmware.map
	-Wl,--cref
	-D USER_SETUP_LOADED
	-D ILI9488_DRIVER
	-D LOAD_GLCD=1     ; 8x6 basic fixed-width font
	-D LOAD_FONT2      ; Small 16-pixel high sans serif font
	-D LOAD_FONT4      ; Medium 26-pixel high sans serif bold font
	-D LOAD_GFXFF      ; FreeFonts support
	-D SPI_FREQUENCY=20000000
	-D SPI_TOUCH_FREQUENCY=2500000
	-D SPI_READ_FREQUENCY=16000000
	${tft.inversion}


; ── Source-file filters (role) ────────────────────────────────────────────────
[role:club]
build_src_filter = +<*> -<REMOTE_STATION.cpp>

[role:remote]
build_src_filter = +<*> -<CLUB_STATION.cpp>


; ── Daniel's hardware ─────────────────────────────────────────────────────────
[daniel-hw]
extends = base
build_flags =
	${base.build_flags}
	; QTH coordinates
	-D HOME_LAT_DEG_CFG=46.0f
	-D HOME_LON_DEG_CFG=6.0f
	; TFT display
	-D TFT_CS=15
	-D TFT_RST=2
	-D TFT_DC=5
	-D TFT_MOSI=23
	-D TFT_SCLK=18
	-D TFT_BLP=4
	-D TFT_MISO=19
	-D TOUCH_CS=17
	; Rotary encoder
	-D PIN_ENC_DT=32
	-D PIN_ENC_CLK=33
	-D PIN_ENC_SW=25
	; HT9200A DTMF
	-D PIN_DIN=17
	-D PIN_CLK=16
	-D PIN_CS=27
	; Buttons (active-low, external pull-ups)
	-D PIN_PBL=35
	-D PIN_PBR=34
	; SDR/TRX relay
	-D PIN_REL_SDR_TRX=13
	; I2C
	-D PIN_SDA=21
	-D PIN_SCL=22

[env:daniel-club]
extends = daniel-hw
build_src_filter = ${role:club.build_src_filter}

[env:daniel-remote]
extends = daniel-hw
build_src_filter = ${role:remote.build_src_filter}


; ── Henryk's hardware ─────────────────────────────────────────────────────────
[henryk-hw]
extends = base
build_flags =
	${base.build_flags}
	; QTH coordinates
	-D HOME_LAT_DEG_CFG=46.0f
	-D HOME_LON_DEG_CFG=6.0f
	; TFT display
	-D TFT_CS=23
	-D TFT_RST=19
	-D TFT_DC=18
	-D TFT_MOSI=05
	-D TFT_SCLK=15
	-D TFT_BLP=17
	-D TFT_MISO=4
	-D TOUCH_CS=16
	; Rotary encoder
	-D PIN_ENC_DT=32
	-D PIN_ENC_CLK=33
	-D PIN_ENC_SW=25
	; HT9200A DTMF
	-D PIN_DIN=26
	-D PIN_CLK=27
	-D PIN_CS=14
	; Buttons (active-low, external pull-ups)
	-D PIN_PBL=35
	-D PIN_PBR=34
	; SDR/TRX relay
	-D PIN_REL_SDR_TRX=13
	; I2C
	-D PIN_SDA=21
	-D PIN_SCL=22

[env:henryk-club]
extends = henryk-hw
build_src_filter = ${role:club.build_src_filter}

[env:henryk-remote]
extends = henryk-hw
build_src_filter = ${role:remote.build_src_filter}
